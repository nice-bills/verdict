name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - run: forge test -vv

  operator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: operator/package-lock.json
      - run: bash scripts/sync-artifacts.sh
      - run: npm ci
        working-directory: operator
      - run: npm run typecheck
        working-directory: operator
      - run: npm run build
        working-directory: operator
      - run: bash scripts/local-agent-e2e.sh
      - name: MCP local E2E
        run: node operator/scripts/mcp-local-e2e.mjs
        env:
          # pragma: allowlist secret — Anvil account #0 (public Foundry fixture)
          ANVIL_DEV_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80" # pragma: allowlist secret

  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: bash scripts/sync-artifacts.sh
      - run: pnpm install --frozen-lockfile
        working-directory: app
      - run: pnpm build
        working-directory: app
      - run: pnpm exec eslint .
        working-directory: app
